name: SZ Weather Auto Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux System Dependencies
      run: |
        sudo apt-get update
        # 补齐 ddddocr 和 OpenCV 运行所需的全部核心库
        sudo apt-get install -y \
          libsm6 libxext6 libxrender-dev \
          libgl1-mesa-glx libgomp1 libglib2.0-0 \
          libnss3 libatk1.0-0 libatk-bridge2.0-0 \
          libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
          libxdamage1 libxrandr2 libgbm1

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager ddddocr Pillow requests

    - name: Run Scraper
      run: |
        # 确认文件名为 wind.py 且在仓库根目录
        python wind.py 

    - name: Commit and Push
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add .
        # 只有在有变化时才 commit
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Auto-update weather data: $(date)"
          git push
        else
          echo "No changes to commit"
        fi
