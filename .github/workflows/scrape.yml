name: SZ Weather Auto Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须给予写入权限，否则生成的 CSV 无法 push 回仓库
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsm6 libxext6 libxrender-dev libgl1-mesa-glx

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager ddddocr Pillow requests

    - name: Run Scraper
      run: |
        python wind.py

    - name: Commit and Push if changed
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add sz_wind_data_updated.csv weather_mapping.json
        # 如果没有文件变化，git commit 会报错，用 || exit 0 跳过
        git commit -m "Auto-update weather data: $(date)" || exit 0
        git push
