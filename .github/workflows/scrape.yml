name: SZ Weather Auto Scraper

# 配置触发条件
on:
  schedule:
    # 每 15 分钟运行一次 (Cron 表达式)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允许你手动点击按钮触发，方便调试

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome and Driver
      run: |

    - name: Run Scraper
      run: |
        python wind.py
      env:
        CF_KV_ID: ${{ secrets.CF_KV_ID }}
        CF_API_KEY: ${{ secrets.CF_API_KEY }}

    - name: Commit and Push if changed
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add sz_wind_data_updated.csv weather_mapping.json
        git commit -m "Auto-update weather data: $(date)" || exit 0
        git push
