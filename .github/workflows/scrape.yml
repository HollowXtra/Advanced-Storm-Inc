name: SZ Weather Auto Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 升级到 v4 解决 deprecation 警告

    - name: Set up Python
      uses: actions/setup-python@v5 # 升级到 v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsm6 libxext6 libxrender-dev libgl1-mesa-glx libgomp1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # 直接在这里列出依赖，确保环境干净
        pip install selenium webdriver-manager ddddocr Pillow requests

    - name: Run Scraper
      run: |
        python wind.py 

    - name: Commit and Push if changed
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add .
        # 只有在有变化时才 commit
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update weather data: $(date)" && git push)
